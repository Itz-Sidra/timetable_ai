<!DOCTYPE html>
<html>
<head>
<title>AI Timetable Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>AI Timetable Scheduler</h1>

<form id="schedulerForm">

<h3>Divisions</h3>
<input type="text" id="divisions" placeholder="A,B,C,D,E,F,SEDA">

<h3>Theory Rooms</h3>
<input type="text" id="theoryRooms" placeholder="4005,4006,4307">

<h3>Lab Rooms</h3>
<input type="text" id="labRooms" placeholder="4304,4104,4007,4008">

<h3>Subjects</h3>
<input type="text" id="subjects" placeholder="AI,ADS,OS,TOC,DV">

<h3>Timeslots</h3>
<input type="text" id="timeslots" placeholder="8,9,10,11,12,2,3,4,5">

<button type="submit">Generate Timetable</button>

</form>

<script src="script.js"></script>

</body>
</html>
